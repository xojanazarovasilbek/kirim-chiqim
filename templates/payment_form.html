{% extends 'base.html' %}
{% block content %}
<div class="col-md-6 mx-auto">
    <div class="card shadow p-4 border-success">
        <h3 class="text-success">💸 Hamkorga to'lov qilish</h3>
        <p class="text-muted">Qarzni yopish uchun to'lov summasini kiriting.</p>
        <hr>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label>Qaysi hamkorga to'lov qilinadi?</label>
                <select name="partner" class="form-select" required>
                    {% for p in partners %}
                    <option value="{{ p.id }}">{{ p.name }} (Qarz: {{ p.balance }} so'm)</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label>To'lov summasi:</label>
                <div class="input-group">
                    <input type="number" step="0.01" name="amount" class="form-control" placeholder="0.00" required>
                    <span class="input-group-text">so'm</span>
                </div>
            </div>
            <div class="mb-3">
                <label>Izoh (ixtiyoriy):</label>
                <textarea name="comment" class="form-control" rows="2" placeholder="Masalan: Naqd pul orqali berildi"></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100 mt-3">To'lovni tasdiqlash</button>
            <a href="{% url 'partners' %}" class="btn btn-link w-100 mt-2 text-decoration-none text-muted">Bekor qilish</a>
        </form>
    </div>
</div>
{% endblock %}
