{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-primary text-white p-3 text-center">
                    <h5 class="mb-0">📦 Yangi mahsulot yaratish</h5>
                </div>
                
                <div class="card-body p-4">
                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <strong>Xatolik:</strong> {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-secondary">Mahsulot nomi</label>
                            <input type="text" name="name" class="form-control form-control-lg" placeholder="Masalan: Coca-Cola 1.5L" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-secondary">Kategoriya</label>
                            <select name="category" class="form-select" required>
                                <option value="" selected disabled>Tanlang...</option>
                                {% for c in categories %}
                                    <option value="{{ c.id }}">{{ c.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-secondary">O'lchov birligi</label>
                            <select name="unit" id="unit-select" class="form-select" onchange="updateUnit()">
                                <option value="dona">Dona</option>
                                <option value="kg">Kilogramm (kg)</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-secondary">Kelgan narxi</label>
                                <div class="input-group">
                                    <input type="number" step="0.01" name="cost_price" class="form-control" placeholder="0.00" required>
                                    <span class="input-group-text small">so'm</span>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-primary">Sotuv narxi</label>
                                <div class="input-group">
                                    <input type="number" step="0.01" name="selling_price" class="form-control border-primary text-primary fw-bold" placeholder="0.00" required>
                                    <span class="input-group-text bg-primary text-white small">so'm</span>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-secondary">Omborda mavjud miqdori</label>
                            <div class="input-group">
                                <input type="number" name="quantity" id="qty-input" step="1" class="form-control" value="0" required>
                                <span class="input-group-text" id="unit-label">dona</span>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg fw-bold shadow-sm">
                                <i class="bi bi-save"></i> Mahsulotni saqlash
                            </button>
                            <a href="{% url 'products' %}" class="btn btn-light btn-sm text-secondary">
                                Bekor qilish
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateUnit() {
        const unitSelect = document.getElementById("unit-select");
        const qtyInput = document.getElementById("qty-input");
        const unitLabel = document.getElementById("unit-label");

        const selectedValue = unitSelect.value;
        unitLabel.innerText = selectedValue;

        if (selectedValue === "kg") {
            qtyInput.step = "0.01"; // kg bo'lsa 0.500 kabi kiritish mumkin
        } else {
            qtyInput.step = "1";    // dona bo'lsa faqat butun son
            if (qtyInput.value.includes('.')) {
                qtyInput.value = Math.round(qtyInput.value);
            }
        }
    }
</script>
{% endblock %}
